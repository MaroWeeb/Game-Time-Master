name: Server reset time changes during server's daylight savings
description: Report a game server being affected by daylight savings. For example, if the SERVER reset time is 05:00 during PST and changes to 06:00 during PDT.
title: "Data correction: GAME_NAME (SERVER/REGION) is affected by daylight savings"
labels: ["game data correction"]
body:
  - type: input
    attributes:
      label: Game name
    validations:
      required: true
  - type: input
    attributes:
      label: Server region/language
    validations:
      required: true
  - type: input
    attributes:
      description: "Example: 05:00 PST."
      label: First server daily reset time
    validations:
      required: true
  - type: input
    attributes:
      description: "Example: 06:00 PST."
      label: Second server daily reset time
    validations:
      required: true
  - type: textarea
    attributes:
      description: Any additional info you want to add.
      label: Anything else?
  - type: upload
    attributes:
      description: Any additional info you want to add, such as screenshots.
      label: Anything else?